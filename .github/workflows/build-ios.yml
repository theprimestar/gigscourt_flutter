name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Enable iOS platform
        run: flutter config --enable-ios

      - name: Create iOS project
        run: |
          flutter create --platforms=ios .
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = com.gigscourt.app;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Install FlutterFire CLI
        run: dart pub global activate flutterfire_cli

      - name: Generate firebase_options.dart
        run: |
          echo "import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;" > lib/firebase_options.dart
          echo "" >> lib/firebase_options.dart
          echo "class DefaultFirebaseOptions {" >> lib/firebase_options.dart
          echo "  static FirebaseOptions get currentPlatform {" >> lib/firebase_options.dart
          echo "    return const FirebaseOptions(" >> lib/firebase_options.dart
          echo "      apiKey: 'AIzaSyAOVhUZ3cFzrN9YiLdKL2bnW8dKKAt8gVQ'," >> lib/firebase_options.dart
          echo "      authDomain: 'gigscourt2.firebaseapp.com'," >> lib/firebase_options.dart
          echo "      projectId: 'gigscourt2'," >> lib/firebase_options.dart
          echo "      storageBucket: 'gigscourt2.appspot.com'," >> lib/firebase_options.dart
          echo "      messagingSenderId: '505136313803'," >> lib/firebase_options.dart
          echo "      appId: '1:505136313803:ios:36d02056936ff71b23324e'," >> lib/firebase_options.dart
          echo "      iosBundleId: 'com.gigscourt.app'," >> lib/firebase_options.dart
          echo "    );" >> lib/firebase_options.dart
          echo "  }" >> lib/firebase_options.dart
          echo "}" >> lib/firebase_options.dart

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build iOS app (Generic Device - No Signing)
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
          cd ..

      - name: Create unsigned IPA
        run: |
          if [ -d "ios/build/Runner.xcarchive/Products/Applications/Runner.app" ]; then
            APP_PATH="ios/build/Runner.xcarchive/Products/Applications/Runner.app"
          else
            echo "❌ Could not find Runner.app"
            exit 1
          fi
          
          echo "📱 Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r gigscourt-unsigned.ipa Payload/
          mkdir -p output
          mv gigscourt-unsigned.ipa output/
          echo "✅ IPA created"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gigscourt-ios-unsigned
          path: output/gigscourt-unsigned.ipa
          retention-days: 7

      - name: Build summary
        run: |
          echo "✅ iOS IPA built successfully"
          echo "📱 File: gigscourt-unsigned.ipa"
          echo "📍 Download from the Artifacts section below"
