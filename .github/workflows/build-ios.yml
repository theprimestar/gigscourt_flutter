name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build iOS app (Generic Device - No Signing)
        run: |
          flutter build ios --release --no-codesign --target=lib/main.dart
          
          # Alternative approach if above fails: build for generic device
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
          
          cd ..

      - name: Create unsigned IPA
        run: |
          # Check if .app exists from flutter build
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/iphoneos/Runner.app"
          elif [ -d "ios/build/Runner.xcarchive/Products/Applications/Runner.app" ]; then
            APP_PATH="ios/build/Runner.xcarchive/Products/Applications/Runner.app"
          else
            echo "❌ Could not find Runner.app"
            exit 1
          fi
          
          echo "📱 Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r gigscourt-unsigned.ipa Payload/
          mkdir -p output
          mv gigscourt-unsigned.ipa output/
          echo "✅ IPA created"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gigscourt-ios-unsigned
          path: output/gigscourt-unsigned.ipa
          retention-days: 7

      - name: Build summary
        run: |
          echo "✅ iOS IPA built successfully"
          echo "📱 File: gigscourt-unsigned.ipa"
          echo "📍 Download from the Artifacts section below"
