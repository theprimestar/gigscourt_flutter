name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Enable iOS platform
        run: flutter config --enable-ios

      - name: Create iOS project
        run: |
          flutter create --platforms=ios .
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = com.gigscourt.app;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build for iOS Simulator
        run: |
          flutter build ios --simulator --release --no-codesign
          
          mkdir -p Payload
          cp -r build/ios/iphonesimulator/Runner.app Payload/
          zip -r gigscourt-unsigned.ipa Payload/
          mkdir -p output
          mv gigscourt-unsigned.ipa output/
          
          echo "✅ Simulator IPA created"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gigscourt-ios-unsigned
          path: output/gigscourt-unsigned.ipa
          retention-days: 7

      - name: Build summary
        run: |
          echo "✅ iOS IPA built successfully"
          echo "📱 File: gigscourt-unsigned.ipa"
          echo "📍 Download from the Artifacts section below"
