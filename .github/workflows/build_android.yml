name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Create Flutter project structure
        run: flutter create --platforms=android .
      
      - name: Upgrade Gradle Configuration (Verified Fix)
        run: |
          # Update gradle-wrapper.properties to Gradle 7.4
          sed -i 's|gradle-.*-all.zip|gradle-7.4-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          
          # Update Android Gradle Plugin to 7.1.2
          sed -i 's|com.android.tools.build:gradle:.*|com.android.tools.build:gradle:7.1.2|g' android/build.gradle
          
          # Force compileSdkVersion and targetSdkVersion to 33
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 33/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 33/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
      
      - run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-Android
          path: build/app/outputs/flutter-apk/app-release.apk
