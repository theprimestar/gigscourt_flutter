name: Build iOS IPA for Scarlet

on:
  workflow_dispatch:  # MANUAL ONLY - Remove 'push' trigger

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - run: flutter pub get
      
      - name: Build iOS IPA (unsigned)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -r build/ios/Release-iphoneos/Runner.app Payload/
          zip -r GigsCourt.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-iOS
          path: GigsCourt.ipa
