name: gigscourt_flutter
description: Connect with local gig workers instantly
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase - Locked versions that work together
  firebase_core: 2.32.0
  firebase_auth: 4.20.0
  cloud_firestore: 4.17.5
  firebase_messaging: 14.9.4
  
  # Supabase
  supabase_flutter: 2.5.0
  
  # Maps (FREE - no API key)
  flutter_map: 7.0.0
  latlong2: 0.9.0
  
  # Images
  image_picker: 1.1.0
  cached_network_image: 3.3.1
  http: 1.2.0
  
  # UI
  shimmer: 3.0.0
  pull_to_refresh: 2.0.0
  
  # Payments - Use url_launcher instead of webview for Paystack
  url_launcher: 6.3.0
  
  # Utilities
  intl: 0.19.0
  geolocator: 11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0

flutter:
  uses-material-design: true
